<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#4b5563"/>
    </marker>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #111827; }
      .actor { font: 700 18px Arial, sans-serif; fill: #2f7d47; }
      .actor-small { font: 700 16px Arial, sans-serif; fill: #2f7d47; }
      .header { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #111827; }
      .tiny { font: 14px Arial, sans-serif; fill: #111827; }
      .note { font: 15px Arial, sans-serif; fill: #374151; }
      .step { font: 700 22px Arial, sans-serif; fill: #2f7d47; }
      .box-blue { fill: #eaf3ff; stroke: #8bb5df; stroke-width: 2; }
      .box-yellow { fill: #fff4d6; stroke: #d8b95f; stroke-width: 2; }
      .box-purple { fill: #f1eafa; stroke: #aa8ac3; stroke-width: 2; }
      .box-green { fill: #e9f8ed; stroke: #86bd91; stroke-width: 2; }
      .lifeline { stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 9 8; }
      .msg { stroke: #111827; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #4b5563; stroke-width: 2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow-dashed); }
      .frame { fill: #ffffff; stroke: #9ca3af; stroke-width: 2; }
      .circle { fill: #e9f8ed; stroke: #86bd91; stroke-width: 2; }
      .guarantee { fill: #edf9ef; stroke: #86bd91; stroke-width: 2; }
    </style>
  </defs>

  <rect x="35" y="25" width="1530" height="1125" rx="12" class="frame"/>
  <text x="800" y="75" text-anchor="middle" class="title">2.6.1 Processus de Création d’un Bounty</text>

  <!-- Actor -->
  <line x1="150" y1="126" x2="150" y2="186" stroke="#2f7d47" stroke-width="3"/>
  <circle cx="150" cy="106" r="15" fill="none" stroke="#2f7d47" stroke-width="3"/>
  <line x1="115" y1="146" x2="185" y2="146" stroke="#2f7d47" stroke-width="3"/>
  <line x1="150" y1="186" x2="118" y2="230" stroke="#2f7d47" stroke-width="3"/>
  <line x1="150" y1="186" x2="182" y2="230" stroke="#2f7d47" stroke-width="3"/>
  <text x="150" y="268" text-anchor="middle" class="actor">Organisation</text>
  <text x="150" y="292" text-anchor="middle" class="actor-small">(Propriétaire)</text>

  <!-- Headers -->
  <rect x="360" y="105" width="175" height="85" rx="8" class="box-blue"/>
  <text x="447.5" y="143" text-anchor="middle" class="header">Frontend</text>
  <text x="447.5" y="168" text-anchor="middle" class="small">(Web3)</text>

  <rect x="635" y="105" width="210" height="85" rx="8" class="box-yellow"/>
  <text x="740" y="143" text-anchor="middle" class="header">Contrat Principal</text>
  <text x="740" y="168" text-anchor="middle" class="small">(BugBountyPlatform)</text>

  <rect x="940" y="105" width="190" height="85" rx="8" class="box-purple"/>
  <text x="1035" y="143" text-anchor="middle" class="header">Contrat Escrow</text>
  <text x="1035" y="168" text-anchor="middle" class="small">(unique)</text>

  <rect x="1230" y="105" width="190" height="85" rx="8" class="box-green"/>
  <text x="1325" y="143" text-anchor="middle" class="header">Blockchain</text>
  <text x="1325" y="168" text-anchor="middle" class="small">locale (Anvil)</text>

  <!-- Lifelines -->
  <line x1="150" y1="315" x2="150" y2="1010" class="lifeline"/>
  <line x1="447.5" y1="190" x2="447.5" y2="1010" class="lifeline"/>
  <line x1="740" y1="190" x2="740" y2="1010" class="lifeline"/>
  <line x1="1035" y1="190" x2="1035" y2="1010" class="lifeline"/>
  <line x1="1325" y1="190" x2="1325" y2="1010" class="lifeline"/>

  <!-- Step circles -->
  <circle cx="78" cy="325" r="25" class="circle"/><text x="78" y="333" text-anchor="middle" class="step">1</text>
  <circle cx="78" cy="500" r="25" class="circle"/><text x="78" y="508" text-anchor="middle" class="step">2</text>
  <circle cx="78" cy="645" r="25" class="circle"/><text x="78" y="653" text-anchor="middle" class="step">3</text>
  <circle cx="78" cy="760" r="25" class="circle"/><text x="78" y="768" text-anchor="middle" class="step">4</text>
  <circle cx="78" cy="840" r="25" class="circle"/><text x="78" y="848" text-anchor="middle" class="step">5</text>
  <circle cx="78" cy="920" r="25" class="circle"/><text x="78" y="928" text-anchor="middle" class="step">6</text>
  <circle cx="78" cy="995" r="25" class="circle"/><text x="78" y="1003" text-anchor="middle" class="step">7</text>

  <!-- Step 1 -->
  <text x="120" y="286" class="small">Préparer les métadonnées du bounty</text>
  <text x="120" y="312" class="small">(titre, description, montant, token,</text>
  <text x="120" y="338" class="small">seuil, dates, règles, etc.)</text>
  <path d="M150 380 H548" class="msg"/>
  <rect x="458" y="405" width="305" height="82" rx="8" class="box-blue"/>
  <text x="610" y="435" text-anchor="middle" class="small">uploadBountyMetadata(metadata)</text>
  <text x="610" y="462" text-anchor="middle" class="small">vers Pinata / IPFS</text>
  <path d="M763 515 H448" class="ret"/>
  <text x="607" y="503" text-anchor="middle" class="small">metadataCID retourné au frontend</text>

  <!-- Step 2 -->
  <text x="120" y="485" class="small">Approuver le token ERC-20</text>
  <text x="120" y="512" class="small">pour le Contrat Principal</text>
  <path d="M150 545 H740" class="msg"/>
  <text x="470" y="530" class="small">token.approve(</text>
  <text x="470" y="556" class="small">BugBountyPlatform, initialFund)</text>
  <path d="M740 590 H448" class="ret"/>
  <text x="530" y="580" class="small">✓ Approval confirmé</text>
  <rect x="1100" y="478" width="300" height="122" rx="8" class="box-yellow"/>
  <text x="1250" y="515" text-anchor="middle" class="note">Le Contrat Principal</text>
  <text x="1250" y="540" text-anchor="middle" class="note">est autorisé à transférer</text>
  <text x="1250" y="565" text-anchor="middle" class="note">les tokens de l'owner</text>
  <text x="1250" y="590" text-anchor="middle" class="note">vers l'Escrow</text>

  <!-- Step 3 -->
  <text x="120" y="645" class="small">Créer le bounty</text>
  <path d="M150 680 H740" class="msg"/>
  <text x="495" y="650" class="small">createBounty(params,</text>
  <text x="495" y="676" class="small">metadataCID, initialFund)</text>
  <rect x="390" y="720" width="570" height="105" rx="8" class="box-yellow"/>
  <text x="410" y="752" class="small">1. token.safeTransferFrom(owner, escrow, initialFund)</text>
  <text x="410" y="782" class="small">2. escrow.deposit(bountyId, initialFund)</text>
  <text x="410" y="812" class="small">3. Enregistrer le bounty</text>
  <path d="M740 845 H1035" class="msg"/>
  <text x="795" y="835" class="small">deposit(bountyId, initialFund)</text>
  <path d="M740 875 H1325" class="msg"/>
  <text x="865" y="865" class="small">emit BountyCreated + BountyFunded</text>
  <path d="M1325 905 H740" class="ret"/>
  <text x="1115" y="895" class="small">✓ Transaction réussie</text>

  <!-- Step 4-7 -->
  <text x="120" y="750" class="small">Les fonds sont verrouillés</text>
  <text x="120" y="777" class="small">dans l'Escrow</text>
  <path d="M1035 935 H1325" class="ret"/>
  <text x="1120" y="925" class="small">Solde de l'Escrow mis à jour</text>

  <text x="120" y="835" class="small">Événements on-chain</text>
  <text x="120" y="862" class="small">BountyCreated + BountyFunded</text>
  <path d="M447 870 H150" class="ret"/>

  <text x="120" y="916" class="small">Le bounty est visible</text>
  <text x="120" y="943" class="small">sur l'interface</text>
  <path d="M447 940 H150" class="ret"/>

  <text x="120" y="990" class="small">Prêt pour les soumissions</text>
  <text x="120" y="1017" class="small">des chercheurs</text>
  <path d="M447 1010 H150" class="ret"/>

  <!-- Guarantee -->
  <rect x="200" y="1060" width="910" height="78" rx="10" class="guarantee"/>
  <text x="250" y="1092" class="header">Garantie :</text>
  <text x="345" y="1092" class="note">Les fonds sont verrouillés on-chain dans l'Escrow dès la création.</text>
  <text x="250" y="1122" class="note">Les récompenses seront distribuées selon la décision du comité.</text>
  <rect x="220" y="1082" width="22" height="30" rx="3" fill="none" stroke="#2f7d47" stroke-width="3"/>
  <path d="M225 1082 C225 1065,237 1065,237 1082" fill="none" stroke="#2f7d47" stroke-width="3"/>
</svg>
